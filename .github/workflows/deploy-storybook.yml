name: Deploy Storybook

# Baut das Storybook aus den committeten Tokens (tokens/*.tokens.json) und
# deployt es nach GitHub Pages. Der Storybook-Viewer liegt in diesem Repo -
# es werden KEINE Secrets benötigt.

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "storybook/**"
      - ".github/workflows/deploy-storybook.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Tokens spiegeln + Storybook bauen
        run: |
          set -euo pipefail
          mkdir -p storybook/src/brands
          cp -f tokens/*.tokens.json storybook/src/brands/ 2>/dev/null || true
          cd storybook
          npm ci
          npm run build-storybook

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook/storybook-static
      - id: deploy
        uses: actions/deploy-pages@v4
