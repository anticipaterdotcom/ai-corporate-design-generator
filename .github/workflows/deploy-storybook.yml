name: Deploy Storybook

# Builds the Storybook from the committed tokens (tokens/*.tokens.json) and
# deploys it to GitHub Pages. The Storybook viewer lives in this repo, so no
# secrets are required.

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "storybook/**"
      - ".github/workflows/deploy-storybook.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Mirror tokens + build Storybook
        run: |
          set -euo pipefail
          mkdir -p storybook/src/brands
          cp -f tokens/*.tokens.json storybook/src/brands/ 2>/dev/null || true
          cd storybook
          npm ci
          npm run build-storybook

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook/storybook-static
      - id: deploy
        uses: actions/deploy-pages@v4
