name: Generate Brand

# Turns a brief (briefs/*.yml) into a brand profile + agent instructions +
# design tokens, and builds a finished Storybook.
#
# SECURITY: this repo is public. The job secrets (DEVSHOT_API_KEY, ENGINE_TOKEN)
# must NOT be exposed to untrusted fork PRs. Therefore the trigger is
# MAINTAINER-GATED: generation only runs on
#   * a /generate comment from someone with write access (OWNER/MEMBER/COLLABORATOR), or
#   * a manual workflow_dispatch.
# GitHub runs issue_comment workflows in the context of the default branch
# (trusted); PR code is NOT executed, only the brief (data) is read.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      brief:
        description: "Path to the brief (e.g. briefs/aurora-labs.yml)"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  guard:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/generate') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: [self-hosted, Linux, X64]
    outputs:
      pr: ${{ steps.ctx.outputs.pr }}
      head_ref: ${{ steps.ctx.outputs.head_ref }}
      brief: ${{ steps.ctx.outputs.brief }}
    steps:
      - name: Resolve context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('pr', '');
              core.setOutput('head_ref', context.ref.replace('refs/heads/', ''));
              core.setOutput('brief', context.payload.inputs.brief);
              return;
            }
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });
            const m = context.payload.comment.body.trim().match(/^\/generate\s+(\S+)/);
            core.setOutput('pr', String(prNumber));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('brief', m ? m[1] : '');
      - name: Acknowledge comment (👀)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'eyes',
            });

  generate:
    needs: guard
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Check out public repo (PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.head_ref }}
          fetch-depth: 0

      - name: Check out private engine (code only)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ENGINE_REPO }}
          token: ${{ secrets.ENGINE_TOKEN }}
          path: _engine

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve brief
        id: brief
        run: |
          set -euo pipefail
          BRIEF="${{ needs.guard.outputs.brief }}"
          if [ -z "$BRIEF" ]; then
            git fetch origin main --depth=1 || true
            BRIEF=$(git diff --name-only origin/main...HEAD -- 'briefs/*.yml' 'briefs/*.json' \
                    | grep -v '_TEMPLATE' | head -1 || true)
          fi
          if [ -z "$BRIEF" ] || [ ! -f "$BRIEF" ]; then
            echo "::error::No brief found. Use '/generate briefs/<file>.yml'."
            exit 1
          fi
          echo "brief=$BRIEF" >> "$GITHUB_OUTPUT"

      - name: Generate brand (DevShot)
        env:
          DEVSHOT_API_KEY: ${{ secrets.DEVSHOT_API_KEY }}
          DEVSHOT_MODEL: ${{ vars.DEVSHOT_MODEL || 'minimax' }}
        run: |
          python3 _engine/scripts/generate_brand.py \
            --brief "${{ steps.brief.outputs.brief }}" \
            --out-brands brands \
            --out-agents agents \
            --out-tokens tokens

      - name: Build Storybook (viewer lives in this repo)
        run: |
          set -euo pipefail
          mkdir -p storybook/src/brands
          cp -f tokens/*.tokens.json storybook/src/brands/ 2>/dev/null || true
          cd storybook
          npm ci
          npm run build-storybook

      - name: Commit artifacts to the PR branch
        if: needs.guard.outputs.pr != ''
        run: |
          set -euo pipefail
          git config user.name  "acdg-bot"
          git config user.email "acdg-bot@users.noreply.github.com"
          git add brands agents tokens
          if git diff --cached --quiet; then
            echo "No new artifacts."
          else
            git commit -m "feat(brand): artifacts for ${{ steps.brief.outputs.brief }} [skip ci]"
            git push origin "HEAD:${{ needs.guard.outputs.head_ref }}"
          fi

      - name: Attach Storybook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-${{ github.run_id }}
          path: storybook/storybook-static
          retention-days: 14

      - name: Comment on the PR
        if: needs.guard.outputs.pr != ''
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.guard.outputs.pr }},
              body: [
                '✅ **Brand generated** for `${{ steps.brief.outputs.brief }}`.',
                '',
                '- `brands/`, `agents/`, `tokens/` committed to the PR branch.',
                `- Finished **Storybook** attached as a [build artifact](${run}).`,
                '- After merging to `main` the Storybook goes live (GitHub Pages).',
              ].join('\n'),
            });
