# Brand brief — copy this file to briefs/<your-brand>.yml and fill it in.
# Only 'name' is required. Everything else sharpens the result; anything left
# empty is invented by the model (or deterministically derived in dry-run).
#
# Field keys are German (the generated brands use German brand voice):
#   branche = industry, anrede = form of address (du/Sie),
#   persoenlichkeit = personality, farb_* = color, typo_* / font_* = typography.

name:            # e.g. Aurora Labs           (REQUIRED)
branche:         # industry, e.g. AI developer tools
anrede:          # du | Sie   (informal | formal)
claim:           # fixed slogan wording (empty = model invents one)

persoenlichkeit: # 3–5 personality attributes
  - # e.g. curious
  - # e.g. precise
  - # e.g. bold

farb_richtung:   # free text, e.g. "cool violet to cyan on a dark ground"
typo_richtung:   # free text, e.g. "geometric grotesque, technical"
bild_richtung:   # free text, e.g. "abstract data visualization, soft glow"
notes:           # anything else the generator should know

# Optional: pin exact colors/fonts (override the free-text hints)
# farb_primary:   "#3B1E6E"
# farb_secondary: "#126E6A"
# farb_accent:    "#5BE0B0"
# font_heading:   "Space Grotesk"
# font_body:      "Inter"
